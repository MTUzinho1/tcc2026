<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Minha Biblioteca - Sistema de Gestão</title>
   <style>
       :root {
           --primary-color: #1d551d;
           --accent-color: #0f6b23;
           --success-color: #27ae60;
           --warning-color: #e67e22;
           --bg-color: #ecddd9;
           --card-bg: #ffffff;
       }

       body {
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           background-color: var(--bg-color);
           margin: 0;
           padding: 0;
           overflow-x: hidden;
       }

       /* --- Telas de Login e Cadastro --- */
       #auth-container {
           display: flex;
           justify-content: center;
           align-items: center;
           height: 100vh;
           background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
       }

       .auth-card {
           background: white;
           padding: 40px;
           border-radius: 12px;
           box-shadow: 0 15px 35px rgba(0,0,0,0.2);
           width: 100%;
           max-width: 400px;
           text-align: center;
       }

       .auth-card h2 { color: var(--primary-color); margin-bottom: 20px; }
      
       .form-group { margin-bottom: 15px; text-align: left; }
       .form-group label { display: block; margin-bottom: 5px; color: #666; }
      
       input[type="text"], input[type="email"], input[type="password"], input[type="date"] {
           width: 100%;
           padding: 12px;
           border: 1px solid #ddd;
           border-radius: 8px;
           box-sizing: border-box;
       }

       .btn-main {
           width: 100%;
           padding: 12px;
           background: var(--accent-color);
           color: white;
           border: none;
           border-radius: 8px;
           cursor: pointer;
           font-weight: bold;
           margin-top: 10px;
       }

       .switch-auth {
           margin-top: 15px;
           font-size: 0.9rem;
           color: #666;
       }

       .switch-auth span { color: var(--accent-color); cursor: pointer; text-decoration: underline; }

       /* --- Interface Principal --- */
       #main-app { display: none; }

       nav {
           background: var(--primary-color);
           padding: 15px 50px;
           display: flex;
           justify-content: space-between;
           align-items: center;
           color: white;
       }

       .nav-links span {
           margin-left: 20px;
           cursor: pointer;
           font-weight: 500;
       }

       header {
           text-align: center;
           padding: 40px 0;
           background: var(--primary-color);
           color: white;
       }

       .search-container {
           max-width: 600px;
           margin: -25px auto 30px;
           display: flex;
           gap: 10px;
       }

       input#searchInput {
           flex-grow: 1;
           padding: 15px;
           border: none;
           border-radius: 25px;
           box-shadow: 0 4px 6px rgba(0,0,0,0.1);
       }

       .book-grid {
           display: grid;
           grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
           gap: 25px;
           max-width: 1200px;
           margin: 0 auto;
           padding: 20px;
       }

       .book-card {
           background: var(--card-bg);
           border-radius: 12px;
           overflow: hidden;
           transition: transform 0.3s ease;
           box-shadow: 0 10px 20px rgba(0,0,0,0.05);
           display: flex;
           flex-direction: column;
       }

       .book-card:hover { transform: translateY(-5px); }

       .book-cover {
           height: 300px;
           background: #ddd;
           background-size: cover;
           background-position: center;
       }

       .book-info { padding: 20px; }
       .book-title { font-size: 1.1rem; margin: 0 0 5px 0; color: var(--primary-color); }
       .book-author { color: #666; font-size: 0.85rem; margin-bottom: 10px; }

       .status-badge {
           display: inline-block;
           padding: 4px 10px;
           border-radius: 12px;
           font-size: 0.7rem;
           font-weight: bold;
           text-transform: uppercase;
       }

       .status-read { background: #d4edda; color: #155724; }
       .status-reading { background: #fff3cd; color: #856404; }
       .status-loaned { background: #f8d7da; color: #721c24; margin-bottom: 5px; }

       .loan-date-info {
           font-size: 0.75rem;
           color: #777;
           margin-top: 5px;
           display: block;
       }

       .btn-loan {
           margin-top: 15px;
           padding: 8px;
           background: var(--primary-color);
           color: white;
           border: none;
           border-radius: 5px;
           cursor: pointer;
           width: 100%;
       }

       /* --- Modal de Empréstimo --- */
       .modal {
           display: none;
           position: fixed;
           top: 0; left: 0; width: 100%; height: 100%;
           background: rgba(0,0,0,0.5);
           justify-content: center;
           align-items: center;
           z-index: 1000;
       }

       .modal-content {
           background: white;
           padding: 30px;
           border-radius: 10px;
           width: 350px;
           max-height: 90vh;
           overflow-y: auto;
       }

       .hidden { display: none; }
   </style>
</head>
<body>

<div id="auth-container">
   <div id="login-box" class="auth-card">
       <h2>Login</h2>
       <div class="form-group">
           <label>E-mail</label>
           <input type="email" placeholder="exemplo@email.com">
       </div>
       <div class="form-group">
           <label>Senha</label>
           <input type="password" placeholder="••••••••">
       </div>
       <button class="btn-main" onclick="showApp()">Entrar</button>
       <p class="switch-auth">Não tem conta? <span onclick="toggleAuth()">Cadastre-se</span></p>
   </div>

   <div id="register-box" class="auth-card hidden">
       <h2>Criar Conta</h2>
       <div class="form-group">
           <label>Nome Completo</label>
           <input type="text" placeholder="Seu Nome">
       </div>
       <div class="form-group">
           <label>E-mail</label>
           <input type="email" placeholder="seu@email.com">
       </div>
       <div class="form-group">
           <label>Senha</label>
           <input type="password" placeholder="Mínimo 6 dígitos">
       </div>
       <button class="btn-main" onclick="showApp()">Cadastrar</button>
       <p class="switch-auth">Já tem conta? <span onclick="toggleAuth()">Fazer Login</span></p>
   </div>
</div>

<div id="main-app">
   <nav>
       <div class="logo">📚 EstanteDigital</div>
       <div class="nav-links">
           <span onclick="showPage('shelf')">Minha Estante</span>
           <span onclick="showPage('loans')">Empréstimos</span>
           <span onclick="logout()" style="color: #ff7675;">Sair</span>
       </div>
   </nav>

   <header>
       <h1>Minha Estante Digital</h1>
       <p id="header-subtitle">Organize sua leitura de forma inteligente</p>
   </header>

   <div class="search-container" id="searchBar">
       <input type="text" id="searchInput" placeholder="Pesquisar por título ou autor..." onkeyup="filterBooks()">
   </div>

   <main class="book-grid" id="bookGrid"></main>

   <main class="book-grid hidden" id="loanGrid">
       <h2 style="grid-column: 1/-1; text-align: center; color: #666;">Nenhum empréstimo ativo no momento.</h2>
   </main>
</div>

<div id="loanModal" class="modal">
   <div class="modal-content">
       <h3>Registrar Empréstimo</h3>
       <p id="modalBookTitle" style="font-weight: bold; color: var(--primary-color);"></p>
       
       <div class="form-group">
           <label>Nome do Amigo/Pessoa</label>
           <input type="text" id="friendName" placeholder="Quem pegou o livro?">
       </div>

       <div class="form-group">
           <label>Data de Empréstimo</label>
           <input type="date" id="loanDate">
       </div>

       <div class="form-group">
           <label>Previsão de Devolução</label>
           <input type="date" id="returnDate">
       </div>

       <button class="btn-main" onclick="confirmLoan()">Confirmar Empréstimo</button>
       <button class="btn-main" style="background: #ccc; color: #333;" onclick="closeModal()">Cancelar</button>
   </div>
</div>

<script>
   // DADOS DOS LIVROS
   let books = [
       { id: 1, title: "Igreja Medieval", author: "Leandro Duarte Rust", status: "Disponível", cover: "https://m.media-amazon.com/images/I/817-fN7-4jL._AC_UF1000,1000_QL80_.jpg", loanedTo: null, loanDate: null, returnDate: null },
       { id: 2, title: "Minha vida secreta na Máfia", author: "Joseph D. Pistone", status: "Disponível", cover: "https://static.estantevirtual.com.br/book/00/1D1-4881-000/1D1-4881-000_detail1.jpg", loanedTo: null, loanDate: null, returnDate: null },
       { id: 3, title: "Mestres do mistério", author: "Edgar Allan Poe", status: "Disponível", cover: "https://martinsfontespaulista.vteximg.com.br/arquivos/ids/1458823-292-292/986695.jpg", loanedTo: null, loanDate: null, returnDate: null },
       { id: 4, title: "As Crônicas de Narnia", author: "C.S Lewis", status: "Disponível", cover: "https://livrista.com.br/thumb/l600/capas/2010/162/177271.jpg", loanedTo: null, loanDate: null, returnDate: null },
       { id: 5, title: "O destino das terras altas", author: "Hannah Howell", status: "Disponível", cover: "https://http2.mlstatic.com/D_Q_NP_666618-MLA93819164369_092025-O.webp", loanedTo: null, loanDate: null, returnDate: null },
       { id: 6, title: "O nome do vento", author: "Patrick Rothfuss", status: "Disponível", cover: "https://i.zst.com.br/thumbs/12/2e/33/37586679.jpg", loanedTo: null, loanDate: null, returnDate: null }
   ];

   let selectedBookId = null;

   // --- FUNÇÕES DE NAVEGAÇÃO E AUTH ---
   function toggleAuth() {
       document.getElementById('login-box').classList.toggle('hidden');
       document.getElementById('register-box').classList.toggle('hidden');
   }

   function showApp() {
       document.getElementById('auth-container').style.display = 'none';
       document.getElementById('main-app').style.display = 'block';
       renderBooks();
   }

   function logout() {
       location.reload();
   }

   function showPage(page) {
       const shelf = document.getElementById('bookGrid');
       const loans = document.getElementById('loanGrid');
       const search = document.getElementById('searchBar');
       const subtitle = document.getElementById('header-subtitle');

       if(page === 'shelf') {
           shelf.classList.remove('hidden');
           search.classList.remove('hidden');
           loans.classList.add('hidden');
           subtitle.innerText = "Organize sua leitura de forma inteligente";
       } else {
           shelf.classList.add('hidden');
           search.classList.add('hidden');
           loans.classList.remove('hidden');
           subtitle.innerText = "Livros que estão com seus amigos";
           renderLoans();
       }
   }

   // --- FUNÇÕES DA BIBLIOTECA ---
   function formatDate(dateStr) {
       if(!dateStr) return "";
       const [year, month, day] = dateStr.split('-');
       return `${day}/${month}/${year}`;
   }

   function renderBooks() {
       const grid = document.getElementById('bookGrid');
       grid.innerHTML = '';

       books.forEach(book => {
           const isLoaned = book.loanedTo !== null;
           const statusClass = isLoaned ? 'status-loaned' : (book.status === 'Lido' ? 'status-read' : 'status-reading');
           const statusText = isLoaned ? `Emprestado para: ${book.loanedTo}` : book.status;

           let dateInfo = "";
           if(isLoaned && book.returnDate) {
               dateInfo = `<span class="loan-date-info">Devolução: ${formatDate(book.returnDate)}</span>`;
           }

           grid.innerHTML += `
               <article class="book-card" data-title="${book.title}" data-author="${book.author}">
                   <div class="book-cover" style="background-image: url('${book.cover}')"></div>
                   <div class="book-info">
                       <h3 class="book-title">${book.title}</h3>
                       <p class="book-author">${book.author}</p>
                       <span class="status-badge ${statusClass}">${statusText}</span>
                       ${dateInfo}
                       ${!isLoaned ? `<button class="btn-loan" onclick="openLoanModal(${book.id})">Emprestar</button>` :
                       `<button class="btn-loan" style="background:#27ae60" onclick="returnBook(${book.id})">Marcar como Devolvido</button>`}
                   </div>
               </article>
           `;
       });
   }

   function renderLoans() {
       const grid = document.getElementById('loanGrid');
       const loanedBooks = books.filter(b => b.loanedTo !== null);
      
       if(loanedBooks.length === 0) {
           grid.innerHTML = '<h2 style="grid-column: 1/-1; text-align: center; color: #999; padding: 40px;">Nenhum livro emprestado no momento.</h2>';
           return;
       }

       grid.innerHTML = '';
       loanedBooks.forEach(book => {
           grid.innerHTML += `
               <div class="book-card">
                   <div class="book-info">
                       <h3 class="book-title">${book.title}</h3>
                       <p><strong>Com:</strong> ${book.loanedTo}</p>
                       <p style="font-size:0.8rem"><strong>Emprestado em:</strong> ${formatDate(book.loanDate)}</p>
                       <p style="font-size:0.8rem; color: #c0392b"><strong>Devolver em:</strong> ${formatDate(book.returnDate)}</p>
                       <button class="btn-loan" onclick="returnBook(${book.id})">Receber de Volta</button>
                   </div>
               </div>
           `;
       });
   }

   // --- LÓGICA DE EMPRÉSTIMO ---
   function openLoanModal(id) {
       selectedBookId = id;
       const book = books.find(b => b.id === id);
       document.getElementById('modalBookTitle').innerText = book.title;
       
       // Preencher data de hoje automaticamente
       const today = new Date().toISOString().split('T')[0];
       document.getElementById('loanDate').value = today;
       
       document.getElementById('loanModal').style.display = 'flex';
   }

   function closeModal() {
       document.getElementById('loanModal').style.display = 'none';
       document.getElementById('friendName').value = '';
       document.getElementById('loanDate').value = '';
       document.getElementById('returnDate').value = '';
   }

   function confirmLoan() {
       const friend = document.getElementById('friendName').value;
       const lDate = document.getElementById('loanDate').value;
       const rDate = document.getElementById('returnDate').value;

       if(!friend) return alert("Digite o nome de quem está pegando o livro!");
       if(!lDate || !rDate) return alert("Preencha as datas de empréstimo e devolução!");

       const index = books.findIndex(b => b.id === selectedBookId);
       books[index].loanedTo = friend;
       books[index].loanDate = lDate;
       books[index].returnDate = rDate;
      
       closeModal();
       renderBooks();
   }

   function returnBook(id) {
       const index = books.findIndex(b => b.id === id);
       books[index].loanedTo = null;
       books[index].loanDate = null;
       books[index].returnDate = null;
       renderBooks();
       renderLoans();
   }

   function filterBooks() {
       const input = document.getElementById('searchInput').value.toLowerCase();
       const cards = document.getElementsByClassName('book-card');

       for (let card of cards) {
           const title = card.getAttribute('data-title').toLowerCase();
           const author = card.getAttribute('data-author').toLowerCase();
           card.style.display = (title.includes(input) || author.includes(input)) ? "" : "none";
       }
   }
</script>

</body>
</html>
